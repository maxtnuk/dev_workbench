format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ оЬС ](bg:#a3aed2 fg:#090c0c)\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
[оВі](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$conda\
$python\
$golang\
$php\
[оВі](fg:#212736 bg:#1d2230)\
$time\
[оВі ](fg:#1d2230)\
\n$character"""

# fisrt layer
[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

# second layer
[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'
ignore_branches = ['master', 'main']

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[git_commit]
style = "bg:#394260"
commit_hash_length = 8
tag_symbol = 'рЯФЦ '
tag_disabled = false

[git_metrics]
disabled=false
format='[([ +$added ]($added_style))([ -$deleted ]($deleted_style))]($style)'

# third layer
[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
style = "bg:#212736"
format = "[${symbol}${pyenv_prefix}($virtualenv)]($style)"

[conda]
style = "bg:#212736"
format = '[[$symbol$environment](fg:#769ff0 bg:#212736)](dimmed green) '

# forth layer
[time]
disabled = false
time_format = "%R"                                      # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
